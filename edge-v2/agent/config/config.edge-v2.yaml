# PlantOS Edge v2 — Configuration (Docker)
# Port MUST be 8011 to avoid conflict with Edge v1 on port 8001.
# node_id MUST be EDGEV2-PC-01 for workspace isolation.

edge_node_id: EDGEV2-PC-01
plant_id: EDGEV2-DEMO
center_url: http://localhost:8000
api_key: plantos-edge-key-2026
session_secret: CHANGE_ME_TO_A_RANDOM_SECRET  # WARNING: agent refuses to start with default

auth: {}

buffer:
  path: /app/data/edge_data.duckdb
  retention_days: 7

mqtt:
  host: localhost
  port: 1883
  topic_prefix: avenue/edgev2-demo

http:
  ingest_url: http://localhost:8000/api/v1/measurements/ingest

heartbeat:
  url: http://localhost:8000/api/v1/edge-nodes/heartbeat
  interval_seconds: 10

publish:
  interval_seconds: 5
  batch_size: 500

# 🔴 MIRROR MODE — Edge v1 remains PRIMARY.
# Connectors mirror v1 signals to EDGEV2-DEMO workspace.
# Generated by tools/migrate_v1_config_to_v2.py
# Source: edge/agent/config.yaml
connectors:
  # WTP-DEMO-01 mirror: v1 simulator signals via HTTP Poll
  mirror_wtp_signals:
    type: http_poll
    enabled: true
    connection:
      url: http://localhost:9998/
    poll_interval_ms: 10000
    tags:
      - tag_id: PUMP-101_discharge_pressure
        source_ref: PUMP-101.discharge_pressure
        signal_id: PUMP-101.discharge_pressure
        data_type: float
        enabled: true
      - tag_id: PUMP-101_flow_rate
        source_ref: PUMP-101.flow_rate
        signal_id: PUMP-101.flow_rate
        data_type: float
        enabled: true
      - tag_id: MOTOR-101_motor_current
        source_ref: MOTOR-101.motor_current
        signal_id: MOTOR-101.motor_current
        data_type: float
        enabled: true

  # VF-DEMO mirror: v1 OPC UA compressor signals
  mirror_vf_compressor:
    type: opcua
    enabled: true
    connection:
      endpoint: opc.tcp://localhost:4840
      timeout: 5.0
    poll_interval_ms: 30000
    tags:
      - tag_id: COMP01-CORE_suction_pressure
        source_ref: ns=2;s=COMP01_SUCTION_PRESSURE
        signal_id: COMP01-CORE.suction_pressure
        data_type: float
        enabled: true
      - tag_id: COMP01-CORE_discharge_pressure
        source_ref: ns=2;s=COMP01_DISCHARGE_PRESSURE
        signal_id: COMP01-CORE.discharge_pressure
        data_type: float
        enabled: true
      - tag_id: COMP01-CORE_flow_rate
        source_ref: ns=2;s=COMP01_FLOW
        signal_id: COMP01-CORE.flow_rate
        data_type: float
        scale: 3600.0
        enabled: true
      - tag_id: COMP01-CORE_suction_temp
        source_ref: ns=2;s=COMP01_SUCTION_TEMP
        signal_id: COMP01-CORE.suction_temp
        data_type: float
        enabled: true
      - tag_id: COMP01-CORE_discharge_temp
        source_ref: ns=2;s=COMP01_DISCHARGE_TEMP
        signal_id: COMP01-CORE.discharge_temp
        data_type: float
        enabled: true
      - tag_id: COMP01-CORE_speed
        source_ref: ns=2;s=COMP01_SPEED
        signal_id: COMP01-CORE.speed
        data_type: float
        enabled: true
      - tag_id: COMP01-CORE_power
        source_ref: ns=2;s=COMP01_POWER
        signal_id: COMP01-CORE.power
        data_type: float
        enabled: true
      - tag_id: COMP01-MOTOR_current
        source_ref: ns=2;s=COMP01_MOTOR_CURRENT
        signal_id: COMP01-MOTOR.current
        data_type: float
        enabled: true
      - tag_id: COMP01-MOTOR_power
        source_ref: ns=2;s=COMP01_MOTOR_POWER
        signal_id: COMP01-MOTOR.power
        data_type: float
        enabled: true
      - tag_id: COMP01-MOTOR_winding_temp
        source_ref: ns=2;s=COMP01_MOTOR_WINDING_TEMP
        signal_id: COMP01-MOTOR.winding_temp
        data_type: float
        enabled: true
      - tag_id: COMP01-MOTOR_bearing_de_temp
        source_ref: ns=2;s=COMP01_MOTOR_BRG_DE_TEMP
        signal_id: COMP01-MOTOR.bearing_de_temp
        data_type: float
        enabled: true
      - tag_id: COMP01-MOTOR_bearing_nde_temp
        source_ref: ns=2;s=COMP01_MOTOR_BRG_NDE_TEMP
        signal_id: COMP01-MOTOR.bearing_nde_temp
        data_type: float
        enabled: true
      - tag_id: COMP01-MOTOR_vibration_de
        source_ref: ns=2;s=COMP01_MOTOR_VIB_DE
        signal_id: COMP01-MOTOR.vibration_de
        data_type: float
        enabled: true
      - tag_id: COMP01-MOTOR_vibration_nde
        source_ref: ns=2;s=COMP01_MOTOR_VIB_NDE
        signal_id: COMP01-MOTOR.vibration_nde
        data_type: float
        enabled: true
      - tag_id: COMP01-BEARINGS_de_temp
