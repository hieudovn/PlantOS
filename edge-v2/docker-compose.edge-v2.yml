version: "3.8"

services:
  plantos-edge-v2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plantos-edge-v2
    ports:
      - "8011:8011"
    volumes:
      - ./agent/config:/app/config
      - edge-v2-data:/app/data
    restart: unless-stopped
    environment:
      - EDGE_CONFIG_PATH=/app/config/config.edge-v2.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  edge-v2-data:
