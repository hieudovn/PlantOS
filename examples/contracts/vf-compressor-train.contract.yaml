  - signal_id: COMP01-MOTOR.bearing_nde_temp
    asset_id: COMP01-MOTOR
    signal_name: bearing_nde_temp
    display_name: "Motor NDE Bearing Temp"
    signal_type: measurement
    data_type: float
    engineering_unit: degC
    status: active

  - signal_id: COMP01-MOTOR.vibration_de
    asset_id: COMP01-MOTOR
    signal_name: vibration_de
    display_name: "Motor DE Vibration"
    signal_type: measurement
    data_type: float
    engineering_unit: mm/s
    status: active

  - signal_id: COMP01-MOTOR.vibration_nde
    asset_id: COMP01-MOTOR
    signal_name: vibration_nde
    display_name: "Motor NDE Vibration"
    signal_type: measurement
    data_type: float
    engineering_unit: mm/s
    status: active

  # === Bearings (6) ===
  - signal_id: COMP01-BEARINGS.de_temp
    asset_id: COMP01-BEARINGS
    signal_name: de_temp
    display_name: "DE Bearing Temperature"
    signal_type: measurement
    data_type: float
    engineering_unit: degC
    status: active

  - signal_id: COMP01-BEARINGS.nde_temp
    asset_id: COMP01-BEARINGS
    signal_name: nde_temp
    display_name: "NDE Bearing Temperature"
    signal_type: measurement
    data_type: float
    engineering_unit: degC
    status: active

  - signal_id: COMP01-BEARINGS.thrust_temp
    asset_id: COMP01-BEARINGS
    signal_name: thrust_temp
    display_name: "Thrust Bearing Temperature"
    signal_type: measurement
    data_type: float
    engineering_unit: degC
    status: active

  - signal_id: COMP01-BEARINGS.vibration_de
    asset_id: COMP01-BEARINGS
    signal_name: vibration_de
    display_name: "DE Vibration"
    signal_type: measurement
    data_type: float
    engineering_unit: mm/s
    status: active

  - signal_id: COMP01-BEARINGS.vibration_nde
    asset_id: COMP01-BEARINGS
    signal_name: vibration_nde
    display_name: "NDE Vibration"
    signal_type: measurement
    data_type: float
