      drift_rate: 0.002
      spike_probability: 0.02
      spike_magnitude: 5.0
      unit: degC
    COMP01.vibration_de_mm_s:
      signal_id: COMP01-BEARINGS.vibration_de
      pattern: degradation
      baseline: 2.2
