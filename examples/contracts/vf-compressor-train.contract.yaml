      pattern: degradation
      baseline: 55.0
      drift_rate: 0.003
      spike_probability: 0.03
      spike_magnitude: 3.0
      unit: degC
    COMP01.motor.bearing_nde_temp_c:
      signal_id: COMP01-MOTOR.bearing_nde_temp
      pattern: degradation
      baseline: 52.0
      drift_rate: 0.003
      spike_probability: 0.03
      spike_magnitude: 3.0
      unit: degC
    COMP01.motor.vibration_de_mm_s:
      signal_id: COMP01-MOTOR.vibration_de
      pattern: degradation
      baseline: 2.0
      drift_rate: 0.001
      spike_probability: 0.05
      spike_magnitude: 0.5
      unit: mm/s
    COMP01.motor.vibration_nde_mm_s:
      signal_id: COMP01-MOTOR.vibration_nde
      pattern: degradation
      baseline: 1.8
      drift_rate: 0.001
      spike_probability: 0.05
      spike_magnitude: 0.4
      unit: mm/s
    COMP01.bearing_de_temp_c:
      signal_id: COMP01-BEARINGS.de_temp
      pattern: degradation
      baseline: 58.0
      drift_rate: 0.004
      spike_probability: 0.03
      spike_magnitude: 4.0
