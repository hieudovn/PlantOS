<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <style>
    text { font-family: monospace; }
    .label { fill: #9ca3af; font-size: 8px; }
    .value { font-size: 10px; font-weight: bold; }
    .equipment-label { fill: #e2e8f0; font-size: 9px; text-anchor: middle; }
  </style>
  <rect width="800" height="300" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="20" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">One-Line Electrical — Substation A</text>

  <!-- Source bus -->
  <line x1="200" y1="60" x2="200" y2="100" stroke="#475569" stroke-width="3"/>
  <line x1="140" y1="60" x2="260" y2="60" stroke="#f59e0b" stroke-width="4"/>
  <text x="400" y="70" fill="#9ca3af" font-size="9" text-anchor="middle">11 kV Bus</text>

  <!-- TRANSFORMER-01 -->
  <g data-asset-id="TRANSFORMER-01" cursor="pointer">
    <circle cx="200" cy="130" r="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <line x1="200" y1="108" x2="200" y2="122" stroke="#475569" stroke-width="2"/>
    <line x1="200" y1="138" x2="200" y2="160" stroke="#475569" stroke-width="2"/>
    <!-- Transformer symbol -->
    <circle cx="200" cy="130" r="20" fill="none" stroke="#475569" stroke-width="2" data-binding="state"/>
    <text x="200" y="127" class="equipment-label">T-01</text>
    <text x="200" y="140" class="label">Transformer</text>
    <!-- Temperature value -->
    <text x="200" y="170" class="value" data-asset-id="TRANSFORMER-01" data-signal-name="temperature" data-binding="signal_value" fill="#22c55e">--.- °C</text>
  </g>

  <!-- Downward line -->
  <line x1="200" y1="190" x2="200" y2="210" stroke="#475569" stroke-width="3"/>

  <!-- FEEDER-01 -->
  <g data-asset-id="FEEDER-01" cursor="pointer">
    <rect x="170" y="210" width="60" height="30" fill="#1e293b" stroke="#475569" stroke-width="2" rx="3" data-binding="state"/>
    <text x="200" y="228" class="equipment-label">F-01</text>
    <text x="200" y="242" class="label">Feeder</text>
    <!-- Current + Power values -->
    <text x="160" y="260" class="value" data-asset-id="FEEDER-01" data-signal-name="current" data-binding="signal_value" fill="#22c55e">---.- A</text>
    <text x="240" y="260" class="value" data-asset-id="FEEDER-01" data-signal-name="power" data-binding="signal_value" fill="#22c55e">--.- kW</text>
  </g>

  <!-- Downward line -->
  <line x1="200" y1="270" x2="200" y2="290" stroke="#475569" stroke-width="3"/>

  <!-- BREAKER-01 -->
  <g data-asset-id="BREAKER-01" cursor="pointer">
    <rect x="170" y="290" width="20" height="20" fill="#1e293b" stroke="#475569" stroke-width="2" data-binding="state"/>
    <text x="180" y="303" class="equipment-label" font-size="8">CB</text>
    <text x="200" y="310" class="label" text-anchor="start">Breaker</text>
    <!-- Status + Voltage -->
    <text x="160" y="330" class="value" data-asset-id="BREAKER-01" data-signal-name="breaker_status" data-binding="signal_value" fill="#22c55e">---</text>
    <text x="240" y="330" class="value" data-asset-id="BREAKER-01" data-signal-name="voltage" data-binding="signal_value" fill="#22c55e">--.-- kV</text>
  </g>

  <!-- Legend -->
  <text x="500" y="80" fill="#9ca3af" font-size="9">Legend:</text>
  <circle cx="510" cy="100" r="6" fill="#22c55e"/><text x="522" y="104" fill="#9ca3af" font-size="8">Running</text>
  <circle cx="510" cy="118" r="6" fill="#ef4444"/><text x="522" y="122" fill="#9ca3af" font-size="8">Alarm</text>
  <circle cx="510" cy="136" r="6" fill="#6b7280"/><text x="522" y="140" fill="#9ca3af" font-size="8">Open</text>
</svg>
