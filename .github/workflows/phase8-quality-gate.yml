name: Phase 8 Quality Gate

on:
  push:
    branches:
      - main
      - phase8-closure
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Verify import
        run: |
          cd backend
          python -c "from app.main import app; print('IMPORT_OK')"
      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/test_health.py tests/test_models.py tests/test_formula_engine.py tests/test_historian_interface.py -v --tb=short --timeout=30

  backend-postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run migrations
        env:
          POSTGRES_HOST: 127.0.0.1
          PGHOST: 127.0.0.1
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        run: |
          cd backend
          alembic upgrade head
      - name: Run PostgreSQL integration tests
        env:
          POSTGRES_HOST: 127.0.0.1
          PGHOST: 127.0.0.1
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        run: |
          cd backend
          python -m pytest tests/test_signal_api.py tests/test_asset_api.py tests/test_contracts_apply.py tests/test_contracts_preview.py tests/test_contracts_validator.py tests/test_measurement_api.py -v --tb=short --timeout=30

  backend-auth-security:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run migrations
        env:
          POSTGRES_HOST: 127.0.0.1
          PGHOST: 127.0.0.1
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        run: |
          cd backend
          alembic upgrade head
      - name: Run auth security tests
        env:
          POSTGRES_HOST: 127.0.0.1
          PGHOST: 127.0.0.1
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
          DEBUG: "false"
        run: |
          cd backend
          python -m pytest tests/test_auth_security.py -v --tb=short --timeout=30

  backend-tdengine-integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run TDengine tests
        run: |
          cd backend
          python -m pytest tests/test_tdengine_adapter.py tests/test_regression_am1.py -v --tb=short --timeout=30 || echo "TDENGINE_UNAVAILABLE"

  frontend-typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build

  edge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Edge dependencies
        run: |
          pip install -r edge-v2/requirements.txt
          pip install pytest-timeout
      - name: Run Edge tests
        env:
          PYTHONPATH: .
          EDGE_SESSION_SECRET: "ci-test-session-secret-min-32-bytes!!"
        run: |
          python -m pytest edge-v2/tests/ -v --tb=short --timeout=30

  edge-docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build edge image
        run: docker build -t plantos-edge-v2:ci -f edge-v2/Dockerfile .

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose config
        run: docker compose -f deployment/docker-compose.yml config
      - name: Build Compose images
        run: docker compose -f deployment/docker-compose.yml build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  findings-register-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate findings CSV
        run: python tools/validate_findings_csv.py
