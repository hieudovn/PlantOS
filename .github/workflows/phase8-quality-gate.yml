name: Phase 8 Quality Gate

on:
  push:
    branches:
      - main
      - phase8-closure
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Verify import
        run: |
          cd backend
          python -c "from app.main import app; print('IMPORT_OK')"
      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/test_health.py tests/test_models.py tests/test_formula_engine.py tests/test_historian_interface.py -v --tb=short --timeout=30

  backend-postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run migrations
        env:
          POSTGRES_HOST: 127.0.0.1
          PGHOST: 127.0.0.1
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        run: |
          cd backend
          alembic upgrade head
      - name: Run PostgreSQL integration tests
        env:
          POSTGRES_HOST: 127.0.0.1
          PGHOST: 127.0.0.1
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        run: |
          cd backend
          python -m pytest tests/test_signal_api.py tests/test_asset_api.py tests/test_contracts_apply.py tests/test_contracts_preview.py tests/test_contracts_validator.py tests/test_measurement_api.py -v --tb=short --timeout=30

  backend-auth-security:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run migrations
        env:
          POSTGRES_HOST: 127.0.0.1
          PGHOST: 127.0.0.1
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        run: |
          cd backend
          alembic upgrade head
      - name: Run auth security tests
        env:
          POSTGRES_HOST: 127.0.0.1
          PGHOST: 127.0.0.1
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
          DEBUG: "false"
        run: |
          cd backend
          python -m pytest tests/test_auth_security.py -v --tb=short --timeout=30

  backend-tdengine-integration:
    runs-on: ubuntu-latest
    # Advisory job — TDengine cannot run in GitHub Actions.
    # This job is non-blocking: continue-on-error prevents it from
    # failing the overall gate while still producing a visible signal.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run TDengine tests (advisory — TDengine unavailable in CI)
        run: |
          cd backend
          python -m pytest tests/test_tdengine_adapter.py tests/test_regression_am1.py -v --tb=short --timeout=30 -p no:warnings

  frontend-typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build

  edge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Edge dependencies
        run: |
          pip install -r edge-v2/requirements.txt
          pip install pytest-timeout
      - name: Run Edge tests
        env:
          PYTHONPATH: .
          EDGE_SESSION_SECRET: "ci-test-session-secret-min-32-bytes!!"
        run: |
          python -m pytest edge-v2/tests/ -v --tb=short --timeout=30

  edge-docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build edge image
        run: docker build -t plantos-edge-v2:ci -f edge-v2/Dockerfile .

  compose-validation:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci_validation_only
      JWT_SECRET: ci_validation_only
      API_KEYS: ci_validation_only
      EDGE_SESSION_SECRET: ci_validation_only
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose config
        run: docker compose -f deployment/docker-compose.yml config
      - name: Validate Release Compose config
        run: RELEASE_SHORT=ci docker compose -f deployment/docker-compose.yml -f deployment/docker-compose.release.yml config
      - name: Build Compose images
        run: docker compose -f deployment/docker-compose.yml build

  release-image-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release images
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT=${SHA:0:7}
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          echo "RELEASE_SHA=${SHA}" >> $GITHUB_ENV
          echo "RELEASE_SHORT=${SHORT}" >> $GITHUB_ENV
          docker build --label "org.opencontainers.image.revision=${SHA}" --label "org.opencontainers.image.created=${TS}" --label "org.opencontainers.image.version=phase8-${SHORT}" -t "plantos-backend:${SHORT}" -f backend/Dockerfile backend
          docker build --label "org.opencontainers.image.revision=${SHA}" --label "org.opencontainers.image.created=${TS}" --label "org.opencontainers.image.version=phase8-${SHORT}" -t "plantos-frontend:${SHORT}" -f frontend/Dockerfile frontend
          docker build --label "org.opencontainers.image.revision=${SHA}" --label "org.opencontainers.image.created=${TS}" --label "org.opencontainers.image.version=phase8-${SHORT}" -t "plantos-edge-v2:${SHORT}" -f edge-v2/Dockerfile .
      - name: Verify OCI labels
        run: |
          SHA=$(git rev-parse HEAD)
          for img in plantos-backend plantos-frontend plantos-edge-v2; do
            TAG="${SHA:0:7}"
            LABEL=$(docker inspect "${img}:${TAG}" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')
            if [ "${LABEL}" != "${SHA}" ]; then
              echo "FAIL: ${img}:${TAG} label=${LABEL} expected=${SHA}"
              exit 1
            fi
            echo "OK: ${img}:${TAG} revision=${LABEL}"
          done
          echo "ALL_OCI_LABELS_OK"
      - name: Export effective release compose
        run: |
          SHA=${RELEASE_SHORT:-$(git rev-parse --short=7 HEAD)}
          POSTGRES_PASSWORD=ci_validation_only JWT_SECRET=ci_validation_only API_KEYS=ci_validation_only \
          EDGE_SESSION_SECRET=ci_validation_only EDGE_CENTER_PASSWORD=ci_validation_only \
          EDGE_API_KEY=ci_validation_only CENTER_URL=https://center.example.invalid \
          RELEASE_SHORT=${SHA} docker compose -f deployment/docker-compose.yml -f deployment/docker-compose.release.yml config > effective-release-compose.yml
      - name: Validate effective release compose
        run: |
          fail() { echo "FAIL: $1"; exit 1; }
          grep -q 'build:' effective-release-compose.yml && fail "backend contains build directive" || echo "OK: no build in effective compose"
          grep -q 'target: development' effective-release-compose.yml && fail "development target found" || echo "OK: no dev target"
          grep -q 'plantos-edge-v2' effective-release-compose.yml || fail "edge-v2 missing from release compose"
          echo "RELEASE_COMPOSE_IMMUTABLE_OK"
      - uses: actions/upload-artifact@v4
        with:
          name: effective-release-compose
          path: effective-release-compose.yml

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Negative test — seed revoked credential
        run: |
          echo "X-API-Key: plantos-edge-key-2026" > /tmp/negative-test-secret.txt
          cp /tmp/negative-test-secret.txt negative-test-secret.txt
          if gitleaks detect --source=. --no-git -v 2>&1 | grep -q "negative-test-secret"; then
            echo "OK: Gitleaks detected seeded credential"
          else
            echo "FAIL: Gitleaks did NOT detect seeded credential"
            rm -f negative-test-secret.txt
            exit 1
          fi
          rm -f negative-test-secret.txt

  findings-register-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate findings CSV
        run: python tools/validate_findings_csv.py
