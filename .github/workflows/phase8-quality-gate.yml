name: Phase 8 Quality Gate

on:
  push:
    branches: [stabilization/phase8]
  pull_request:
    branches: [stabilization/phase8]

jobs:
  backend-import-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Verify import
        run: |
          cd backend
          python -c "from app.main import app; print('IMPORT_OK')"
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://plantos:plantos_test@localhost:5432/plantos_test
        run: |
          cd backend
          alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://plantos:plantos_test@localhost:5432/plantos_test
        run: |
          cd backend
          pytest -q --timeout=30

  frontend-typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build

  edge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install edge deps
        run: |
          pip install pytest pyyaml
      - name: Run edge tests
        run: |
          pytest edge-v2/tests -q --timeout=30

  edge-docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build edge image
        run: |
          docker build --no-cache \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            -t plantos-edge-v2:ci-${{ github.sha }} \
            -f edge-v2/Dockerfile .

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
