name: Phase 8 Quality Gate

on:
  push:
    branches:
      - stabilization/phase8
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-import-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plantos
          POSTGRES_PASSWORD: plantos_test
          POSTGRES_DB: plantos_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Verify import
        run: |
          cd backend
          python -c "from app.main import app; print('IMPORT_OK')"
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://plantos:plantos_test@127.0.0.1:5432/plantos_test
        run: |
          cd backend
          alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://plantos:plantos_test@127.0.0.1:5432/plantos_test
        run: |
          cd backend
          python -m pytest -q --timeout=30

  frontend-typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build

  edge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Edge dependencies
        run: |
          pip install -r edge-v2/requirements.txt
          pip install pytest-timeout
      - name: Run Edge tests
        run: |
          python -m pytest edge-v2/tests -q --timeout=30

  edge-docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build edge image
        run: |
          docker build --no-cache \
            --label org.opencontainers.image.revision=${{ github.sha }} \
            -t plantos-edge-v2:ci-${{ github.sha }} \
            -f edge-v2/Dockerfile .

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose config
        run: |
          docker compose -f deployment/docker-compose.yml config
      - name: Build Compose images
        run: |
          docker compose -f deployment/docker-compose.yml build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  findings-register-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate findings CSV
        run: |
          python tools/validate_findings_csv.py
