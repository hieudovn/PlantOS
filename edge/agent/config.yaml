edge_node_id: edge-agent-01
plant_id: DEMO-PLANT
center_url: http://localhost:8000

# DuckDB local buffer
buffer:
  path: edge_data.duckdb
  retention_days: 60

# MQTT publisher
mqtt:
  host: localhost
  port: 1883
  topic_prefix: avenue/demo-plant

# HTTP fallback (when MQTT unavailable)
http:
  ingest_url: http://localhost:8000/api/v1/measurements/ingest

# Center heartbeat
heartbeat:
  url: http://localhost:8000/api/v1/edge-nodes/heartbeat
  interval_seconds: 10

# Signal generation (same signals as simulator)
signals:
  - signal_id: PUMP-101.discharge_pressure
    data_type: float
    min: 5.0
    max: 9.0
    noise: 0.2
    pattern: sine
  - signal_id: PUMP-101.flow_rate
    data_type: float
    min: 80.0
    max: 120.0
    noise: 1.0
    pattern: sine
  - signal_id: MOTOR-101.motor_current
    data_type: float
    min: 40.0
    max: 60.0
    noise: 0.5
    pattern: sine

publish:
  interval_seconds: 1
  batch_size: 10
