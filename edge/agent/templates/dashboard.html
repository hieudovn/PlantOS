<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PlantOS Edge Agent</title>
<style>
  :root {
    --bg-primary: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
    --border: #334155; --text-primary: #e2e8f0; --text-muted: #94a3b8;
    --text-dim: #64748b; --accent: #3b82f6; --status-good: #22c55e;
    --status-warn: #f59e0b; --status-alarm: #ef4444; --status-offline: #6b7280;
    --radius: 8px; --font-sans: system-ui,-apple-system,sans-serif;
    --font-mono: 'Consolas','Courier New',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans);padding:0}
  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;
    border-bottom:1px solid var(--border);background:var(--bg-card)}
  .header h1{font-size:16px;font-weight:700;letter-spacing:-0.3px}
  .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 16px;background:var(--bg-card)}
  .tab{padding:10px 20px;font-size:13px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--text-primary);border-bottom-color:var(--accent)}
  .tab:hover{color:var(--text-primary)}
  .content{padding:24px;display:none}
  .content.active{display:block}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
  .card .label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
  .card .value{font-size:22px;font-weight:700;margin-top:6px;font-family:var(--font-mono)}
  .card .value.green{color:var(--status-good)}.card .value.yellow{color:var(--status-warn)}
  .card .value.red{color:var(--status-alarm)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:10px 12px;background:var(--bg-primary);color:var(--text-muted);
    font-weight:500;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
  td{padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:11px}
  .badge{display:inline-flex;padding:1px 8px;border-radius:4px;font-size:10px;font-weight:500}
  .badge.simulated{background:#312e81;color:#8b5cf6}.badge.good{background:#166534;color:var(--status-good)}
  .badge.bad{background:#7f1d1d;color:var(--status-alarm)}
  .footer{padding:12px 24px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);
    display:flex;justify-content:space-between}
  .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  .status-dot.on{background:var(--status-good)}.status-dot.off{background:var(--status-offline)}
  .section-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .section-title .count{font-size:11px;color:var(--text-muted);font-weight:400}
  #updated{font-size:10px;color:var(--text-dim);text-align:right;margin-top:8px}
  .info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)}
  .info-row:last-child{border-bottom:none}
  .info-row .label{color:var(--text-muted)}.info-row .value{color:var(--text-primary);font-family:var(--font-mono)}
</style></head><body>
<div class="header"><h1>&#127963; PlantOS Edge Agent</h1><span style="font-size:12px;color:var(--text-muted)">v0.2.0</span></div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')">&#128202; Dashboard</div>
  <div class="tab" onclick="switchTab('assets')">&#127963; Assets</div>
  <div class="tab" onclick="switchTab('connections')">&#128268; Connections</div>
</div>

<div id="tab-dashboard" class="content active">
  <div class="grid" id="stats"></div>
  <div class="section-title">&#128200; Latest Values <span class="count" id="signal-count"></span></div>
  <table><thead><tr><th>Signal ID</th><th>Value</th><th>Quality</th><th>Timestamp</th></tr></thead><tbody id="latest"></tbody></table>
  <div id="updated">Auto-refresh: 5s</div>
</div>

<div id="tab-assets" class="content">
  <div class="section-title">&#127963; Synced Assets <span class="count" id="asset-count"></span></div>
  <table><thead><tr><th>Asset ID</th><th>Name</th><th>Type</th><th>Status</th></tr></thead><tbody id="assets-tbody"></tbody></table>
  <div style="margin-top:8px"><button class="tab" style="display:inline-block;padding:6px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);cursor:pointer" onclick="loadAssets()">&#8635; Refresh</button></div>
</div>

<div id="tab-connections" class="content">
  <div class="section-title">&#128268; Connections</div>
  <div class="grid">
    <div class="card" id="conn-mqtt"><div class="label">MQTT</div><div class="value" style="font-size:14px">Loading...</div></div>
    <div class="card" id="conn-modbus"><div class="label">Modbus</div><div class="value" style="font-size:14px">Loading...</div></div>
    <div class="card" id="conn-sync"><div class="label">Sync Backlog</div><div class="value" style="font-size:14px">Loading...</div></div>
    <div class="card" id="conn-ingest"><div class="label">HTTP Ingest</div><div class="value" style="font-size:14px">Loading...</div></div>
  </div>
  <div style="margin-top:8px"><button class="tab" style="display:inline-block;padding:6px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);cursor:pointer" onclick="loadConnections()">&#8635; Refresh</button></div>
</div>

<div class="footer"><span id="footer-info">Edge Agent</span><span>PlantOS v0.2.0</span></div>

<script>
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.tab[onclick*='${id}']`).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if (id==='assets') loadAssets();
  if (id==='connections') loadConnections();
}

async function loadDashboard() {
  try {
    const s = await fetch('/api/status').then(r=>r.json());
    document.getElementById('stats').innerHTML = `
      <div class="card"><div class="label">Uptime</div><div class="value green">${Math.floor(s.uptime_seconds/60)}m</div></div>
      <div class="card"><div class="label">DB Rows</div><div class="value">${(s.duckdb.total_rows||0).toLocaleString()}</div></div>
      <div class="card"><div class="label">Unsynced</div><div class="value ${(s.duckdb.unsynced||0)>0?'yellow':'green'}">${s.duckdb.unsynced||0}</div></div>
      <div class="card"><div class="label">MQTT</div><div class="value ${s.mqtt.connected?'green':'red'}">${s.mqtt.connected?'ON':'OFF'}</div></div>
      <div class="card"><div class="label">Signals</div><div class="value">${s.signals||0}</div></div>
      <div class="card"><div class="label">DB Size</div><div class="value">${(s.duckdb.db_size_mb||0).toFixed(2)} MB</div></div>`;
    document.getElementById('footer-info').textContent = 'Agent: '+(s.node_id||'unknown')+' | Synced: '+(s.duckdb.total_rows||0)+' rows';
    const l = await fetch('/api/measurements/latest').then(r=>r.json());
    document.getElementById('latest').innerHTML = (l||[]).map(m=>
      '<tr><td>'+m.signal_id+'</td><td>'+(m.value!=null?m.value:'&mdash;')+'</td>'+
      '<td><span class="badge '+(m.quality||'').toLowerCase()+'">'+(m.quality||'&mdash;')+'</span></td>'+
      '<td style="color:var(--text-dim)">'+(m.timestamp?new Date(m.timestamp).toLocaleTimeString():'&mdash;')+'</td></tr>'
    ).join('');
    document.getElementById('signal-count').textContent = '| '+(l||[]).length+' signals';
    document.getElementById('updated').textContent = 'Updated: '+new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}

async function loadAssets() {
  try {
    const a = await fetch('/api/assets').then(r=>r.json());
    document.getElementById('assets-tbody').innerHTML = (a||[]).map(x=>
      '<tr><td>'+x.asset_id+'</td><td style="font-family:var(--font-sans)">'+x.name+'</td>'+
      '<td>'+x.asset_type+'</td><td><span class="badge '+(x.lifecycle_status||'active')+'">'+(x.lifecycle_status||'active')+'</span></td></tr>'
    ).join('');
    document.getElementById('asset-count').textContent = '| '+(a||[]).length+' assets';
  } catch(e) { console.error(e); }
}

async function loadConnections() {
  try {
    const s = await fetch('/api/status').then(r=>r.json());
    document.getElementById('conn-mqtt').innerHTML = '<div class="label">MQTT</div>'+
      '<div class="value" style="font-size:14px"><span class="status-dot '+(s.mqtt.connected?'on':'off')+'"></span>'+(s.mqtt.connected?'Connected':'Disconnected')+'</div>';
    document.getElementById('conn-modbus').innerHTML = '<div class="label">Modbus</div>'+
      '<div class="value" style="font-size:14px">'+(s.modbus?.enabled?'<span class="status-dot '+(s.modbus.connected?'on':'off')+'"></span>'+(s.modbus.connected?'Connected':'Disconnected')+' ('+(s.modbus.host||'')+':'+s.modbus.tags+' tags)':'<span class="status-dot off"></span>Disabled')+'</div>';
    document.getElementById('conn-sync').innerHTML = '<div class="label">Sync Backlog</div>'+
      '<div class="value" style="font-size:14px;color:'+((s.sync?.backlog||0)>0?'var(--status-warn)':'var(--status-good)')+'">'+(s.sync?.backlog||0)+' rows</div>';
    document.getElementById('conn-ingest').innerHTML = '<div class="label">HTTP Ingest</div>'+
      '<div class="value" style="font-size:12px;font-family:var(--font-mono)">awaiting config</div>';
  } catch(e) { console.error(e); }
}

loadDashboard(); setInterval(loadDashboard, 5000);
</script></body></html>
