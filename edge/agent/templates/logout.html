<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PlantOS Edge — Logout</title>
<style>
  :root{--bg-primary:#0f172a;--bg-card:#1e293b;--border:#334155;--text-primary:#e2e8f0;--text-muted:#94a3b8;--accent:#3b82f6;--radius:8px;--font-sans:system-ui,-apple-system,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:360px;text-align:center}
  h1{font-size:18px;margin-bottom:8px}
  p{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.5}
  .btn{display:inline-block;padding:10px 24px;border-radius:var(--radius);text-decoration:none;font-size:13px;font-weight:500;margin:4px}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
  .btn-secondary:hover{color:var(--text-primary);border-color:var(--text-muted)}
</style></head><body>
<div class="card">
  <h1>&#128274; Edge Agent Logged Out</h1>
  <p>You have been logged out of the Edge Agent interface.<br>Return to the dashboard or go to Center.</p>
  <div>
    <a href="/" class="btn btn-primary">&#127963; Edge Dashboard</a>
    <a href="http://103.97.132.249/" class="btn btn-secondary">&#127963; Center</a>
  </div>
</div>
</body></html>
