<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PlantOS Edge — Setup</title>
<style>
  :root {
    --bg-primary: #0f172a; --bg-card: #1e293b; --bg-input: #0f172a;
    --border: #334155; --text-primary: #e2e8f0; --text-muted: #94a3b8;
    --text-dim: #64748b; --accent: #3b82f6; --radius: 8px;
    --font-sans: system-ui,-apple-system,sans-serif;
    --font-mono: 'Consolas','Courier New',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-sans);padding:24px}
  h1{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);letter-spacing:-0.3px}
  h2{font-size:13px;font-weight:600;margin:16px 0 10px}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  .row{display:flex;gap:14px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
  label{font-size:11px;color:var(--text-muted);min-width:70px;text-transform:uppercase;letter-spacing:0.4px}
  input,select{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius);
    color:var(--text-primary);padding:7px 12px;font-size:13px;font-family:var(--font-mono);outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  input{width:180px}input[type=number]{width:100px}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
  th{text-align:left;padding:8px 10px;background:var(--bg-primary);color:var(--text-muted);
    font-weight:500;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:0.4px}
  td{padding:6px 8px;border-bottom:1px solid var(--border)}
  td input{width:100%;padding:4px 8px;font-size:11px}
  .btn{padding:7px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:12px;
    font-weight:500;font-family:var(--font-sans)}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#2563eb}
  .btn-success{background:#22c55e;color:#fff}.btn-danger{background:#ef4444;color:#fff}
  .btn-sm{padding:4px 10px;font-size:11px}
  .badge{padding:2px 10px;border-radius:4px;font-size:11px}
  .badge.on{background:#166534;color:#22c55e}.badge.off{background:#7f1d1d;color:#ef4444}
  #result{margin-top:12px;padding:10px 14px;border-radius:var(--radius);font-size:12px;display:none}
  #result.ok{background:#166534;color:#22c55e;display:block}
  #result.err{background:#7f1d1d;color:#ef4444;display:block}
  #msg{font-size:10px;color:var(--text-dim);margin-top:12px}
</style></head><body>
<h1>&#9881; PlantOS Edge — Protocol Setup</h1>

<div class="card">
  <h2>Connection Status</h2>
  <div class="row"><label>Modbus:</label><span id="conn-status" class="badge off">Checking...</span></div>
  <div class="row"><label>Host:</label><span id="conn-host" style="font-size:12px;font-family:var(--font-mono)">—</span></div>
  <div class="row"><label>Tags:</label><span id="conn-tags" style="font-size:12px">—</span></div>
</div>

<div class="card">
  <h2>Modbus Connection</h2>
  <div class="row"><label>Host:</label><input id="host" value="127.0.0.1" /></div>
  <div class="row"><label>Port:</label><input id="port" type="number" value="502" /></div>
  <div class="row"><label>Unit ID:</label><input id="unit" type="number" value="1" /></div>
  <div class="row"><label>Poll (ms):</label><input id="poll" type="number" value="1000" /></div>
  <div class="row">
    <button class="btn btn-primary" onclick="testConnection()">Test Connection</button>
    <span id="test-result" style="font-size:12px;font-family:var(--font-mono)"></span>
  </div>
</div>

<div class="card">
  <h2>Tag Mapping</h2>
  <table><thead><tr><th>Register</th><th>Type</th><th>Data Type</th><th>Signal ID</th><th>Scale</th><th>Offset</th><th></th></tr></thead>
  <tbody id="tag-table"></tbody></table>
  <div style="margin-top:10px"><button class="btn btn-success btn-sm" onclick="addTag()">+ Add Tag</button></div>
</div>

<div id="result"></div>
<div id="msg"></div>

<script>
async function loadStatus() {
  try {
    const r = await fetch('/api/protocols/status').then(r=>r.json());
    const m = r.modbus || {};
    document.getElementById('conn-status').textContent = m.connected ? 'ON' : 'OFF';
    document.getElementById('conn-status').className = 'badge ' + (m.connected ? 'on' : 'off');
    document.getElementById('conn-host').textContent = m.host || '—';
    document.getElementById('conn-tags').textContent = m.tags || '—';
  } catch(e) { console.error(e); }
}

async function testConnection() {
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Testing...';
  document.getElementById('test-result').textContent = '';
  try {
    const r = await fetch('/api/protocols/status').then(r=>r.json());
    const ok = r.modbus && r.modbus.connected;
    document.getElementById('test-result').textContent = ok ? '✓ Connected' : '✗ Not connected';
    document.getElementById('test-result').style.color = ok ? '#22c55e' : '#ef4444';
    loadStatus();
  } catch(e) {
    document.getElementById('test-result').textContent = 'Error: '+e.message;
    document.getElementById('test-result').style.color = '#ef4444';
  }
  btn.disabled = false; btn.textContent = 'Test Connection';
}

const defaultTags = [
  {reg:40001, type:'holding', datatype:'float', signal:'PUMP-101.discharge_pressure', scale:1, offset:0},
  {reg:40002, type:'holding', datatype:'float', signal:'PUMP-101.flow_rate', scale:0.1, offset:0},
  {reg:1, type:'coil', datatype:'bool', signal:'PUMP-101.running_status', scale:1, offset:0},
];

function renderTags(tags) {
  const tb = document.getElementById('tag-table');
  tb.innerHTML = tags.map((t,i) => '<tr>'+
    '<td><input type="number" value="'+t.reg+'" data-idx="'+i+'" data-field="reg"/></td>'+
    '<td><select data-idx="'+i+'" data-field="type"><option value="holding"'+(t.type==='holding'?' selected':'')+'>Holding</option><option value="coil"'+(t.type==='coil'?' selected':'')+'>Coil</option></select></td>'+
    '<td><select data-idx="'+i+'" data-field="datatype"><option value="float"'+(t.datatype==='float'?' selected':'')+'>Float32</option><option value="int"'+(t.datatype==='int'?' selected':'')+'>Int16</option></select></td>'+
    '<td><input value="'+t.signal+'" data-idx="'+i+'" data-field="signal"/></td>'+
    '<td><input type="number" step="0.1" value="'+t.scale+'" data-idx="'+i+'" data-field="scale"/></td>'+
    '<td><input type="number" step="0.1" value="'+t.offset+'" data-idx="'+i+'" data-field="offset"/></td>'+
    '<td><button class="btn btn-danger btn-sm" onclick="removeTag('+i+')">&times;</button></td></tr>'
  ).join('');
}
let tags = [...defaultTags];
renderTags(tags);

function addTag() {
  tags.push({reg:0, type:'holding', datatype:'float', signal:'', scale:1, offset:0});
  renderTags(tags);
}
function removeTag(i) {
  tags.splice(i,1); renderTags(tags);
}

function saveConfig() {
  const cfg = {
    host: document.getElementById('host').value,
    port: parseInt(document.getElementById('port').value),
    unit: parseInt(document.getElementById('unit').value),
    poll: parseInt(document.getElementById('poll').value),
    tags: tags.map(t => ({
      register: t.reg, type: t.type, data_type: t.datatype,
      signal_id: t.signal, scale: t.scale, offset: t.offset
    }))
  };
  document.getElementById('result').className = 'ok';
  document.getElementById('result').textContent = 'Config captured (save to config.yaml manually in MVP). Tags: '+cfg.tags.length;
  document.getElementById('msg').textContent = 'MVP: Copy tags to edge/agent/config.yaml modbus.tags section';
}

loadStatus(); setInterval(loadStatus, 5000);
</script></body></html>
